<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Marker — Kelompok 14</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="header">
      <h1>Map Marker — Kelompok 14</h1>
      <span id="total-marker">Loading...</span>
    </div>

    <div id="lokasi-panel">
      <div class="lokasi-title">Daftar Lokasi</div>

      <!-- Filter buttons -->
      <div id="filter-buttons" style="margin-bottom: 8px">
        <button onclick="filterMarker('semua')" class="filter-btn active">Semua</button>
        <button onclick="filterMarker('sekolah')" class="filter-btn">🏫 Sekolah</button>
        <button onclick="filterMarker('masjid')" class="filter-btn">🕌 Masjid</button>
        <button onclick="filterMarker('umum')" class="filter-btn">🏞️ Umum</button>
      </div>

      <div id="lokasi-buttons"></div>
    </div>

    <div id="legend-panel">
      <div class="legend-title">Keterangan Marker</div>
      <div class="legend-item"><span class="legend-color marker-sekolah">🏫</span> Sekolah (Biru)</div>
      <div class="legend-item"><span class="legend-color marker-masjid">🕌</span> Masjid (Hijau)</div>
      <div class="legend-item"><span class="legend-color marker-umum">🏞️</span> Tempat Umum (Kuning)</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="marker.js"></script>

    <script>
      const map = L.map("map", {
        zoomControl: false,
      }).setView([5.5483, 95.3238], 13);
      L.control
        .zoom({
          position: "bottomright",
        })
        .addTo(map);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

      const daftarLokasi = [];

      function buatIkon(kategori) {
        let icon = "📍";
        let bgClass = "marker-umum";

        if (kategori === "sekolah") {
          icon = "🏫";
          bgClass = "marker-sekolah";
        } else if (kategori === "masjid") {
          icon = "🕌";
          bgClass = "marker-masjid";
        } else if (kategori === "umum") {
          icon = "🏞️";
          bgClass = "marker-umum";
        }

        return L.divIcon({
          html: `<div class="custom-marker ${bgClass}">${icon}</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15],
          className: "",
        });
      }

      function tambahMarkers(data, nama) {
        data.forEach((item) => {
          const marker = L.marker([item.lat, item.lng], {
            icon: buatIkon(item.kategori),
          }).addTo(map).bindPopup(`
      <b>${item.nama}</b><br>
      ${item.deskripsi}<br>
      <i>Kategori: ${item.kategori}</i><br>
      <small>oleh ${nama}</small>
    `);

          daftarLokasi.push({
            ...item,
            marker,
            kontributor: nama,
          });
        });
      }

      // Tambah semua data
      tambahMarkers(markersMilan, "Milan");
      tambahMarkers(markersHalim, "Halim");
      tambahMarkers(markersReyan, "Reyan");

      // TOTAL
      const total = markersMilan.length + markersHalim.length + markersReyan.length;

      document.getElementById("total-marker").textContent = total + " lokasi";

      // LIST BUTTON
      const container = document.getElementById("lokasi-buttons");

      let userLocation = null;
      let currentRoute = null;

      function buatRuteKeLokasi(latTujuan, lngTujuan) {
        if (userLocation) {
          if (currentRoute) {
            // Hapus rute sebelumnya dari peta
            map.removeControl(currentRoute);
          }

          // Generate rute menggunakan Leaflet Routing Machine (mirip Google Maps)
          currentRoute = L.Routing.control({
            waypoints: [L.latLng(userLocation[0], userLocation[1]), L.latLng(latTujuan, lngTujuan)],
            routeWhileDragging: false,
            addWaypoints: false, // Jangan izinkan nambah waypoint dr klik di line
            show: false, // Sembunyikan panel instruksi yang makan ruang
            createMarker: function () {
              return null;
            }, // Matikan marker tambahan otomatis
            lineOptions: {
              styles: [
                {
                  color: "#3b82f6",
                  opacity: 0.8,
                  weight: 5,
                },
              ],
            },
          }).addTo(map);
        }
      }

      daftarLokasi.forEach((lokasi) => {
        const btn = document.createElement("button");
        btn.textContent = lokasi.nama + " (" + lokasi.kontributor + ")";
        lokasi.btn = btn;

        // Aksi saat tombol ditekan
        btn.onclick = () => {
          map.flyTo([lokasi.lat, lokasi.lng], 16);
          lokasi.marker.openPopup();
          buatRuteKeLokasi(lokasi.lat, lokasi.lng);
        };

        // Aksi saat marker di peta ditekan
        lokasi.marker.on("click", () => {
          buatRuteKeLokasi(lokasi.lat, lokasi.lng);
        });

        container.appendChild(btn);
      });

      // LOKASI SAYA
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        userLocation = [lat, lng];

        L.marker(userLocation).addTo(map).bindPopup("📍 Lokasi Saya").openPopup();
      });

      function filterMarker(kategori) {
        // Update tombol aktif
        document.querySelectorAll(".filter-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        // Tampil/sembunyiin marker & button
        daftarLokasi.forEach((lokasi) => {
          const cocok = kategori === "semua" || lokasi.kategori === kategori;

          if (cocok) {
            map.addLayer(lokasi.marker);
            lokasi.btn.style.display = "block";
          } else {
            map.removeLayer(lokasi.marker);
            lokasi.btn.style.display = "none";
          }
        });
      }
    </script>
  </body>
</html>
