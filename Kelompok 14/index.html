<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Marker — Kelompok 14</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="header">
      <h1>Map Marker — Kelompok 14</h1>
      <span id="total-marker">Loading...</span>
    </div>

    <div id="lokasi-panel">
      <div class="lokasi-title">Pergi ke Titik</div>
      <div id="lokasi-buttons"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="marker.js"></script>

    <script>
      const map = L.map("map").setView([5.38, 95.96], 10);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
      }).addTo(map);

      const warna = {
        milan: "#e67e22",
        halim: "#9b59b6",
        reyan: "#1abc9c",
      };

      const daftarLokasi = [];

      function buatIkon(warna) {
        return L.divIcon({
          html: `<div style="width:14px;height:14px;background:${warna};border-radius:50%;border:2px solid white;"></div>`,
          iconSize: [14, 14],
        });
      }

      function tambahMarkers(data, warnaDot, nama) {
        data.forEach((item) => {
          const marker = L.marker([item.lat, item.lng], {
            icon: buatIkon(warnaDot),
          })
            .addTo(map)
            .bindPopup(`<b>${item.nama}</b><br>${item.deskripsi}`);

          daftarLokasi.push({ ...item, marker, kontributor: nama });
        });
      }

      // Panggil data dari marker.js
      tambahMarkers(markersMilan, warna.milan, "Milan");
      tambahMarkers(markersHalim, warna.halim, "Halim");
      tambahMarkers(markersReyan, warna.reyan, "Reyan");

      // Total marker
      const total = markersMilan.length + markersHalim.length + markersReyan.length;

      document.getElementById("total-marker").textContent = total + " lokasi";

      // Tombol navigasi
      const container = document.getElementById("lokasi-buttons");

      daftarLokasi.forEach((lokasi) => {
        const btn = document.createElement("button");
        btn.textContent = lokasi.nama + " (" + lokasi.kontributor + ")";
        btn.onclick = () => {
          map.flyTo([lokasi.lat, lokasi.lng], 15);
          lokasi.marker.openPopup();
        };
        container.appendChild(btn);
      });
    </script>
  </body>
</html>
